name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck API
        run: pnpm -C garage-admin-console/api typecheck

      - name: Build shared packages
        run: pnpm build:packages

      - name: Build web
        run: pnpm -C garage-admin-console/web build

      - name: Test API
        run: pnpm -C garage-admin-console/api test:run

      - name: Test web
        run: pnpm -C garage-admin-console/web test:run
