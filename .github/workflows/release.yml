name: Release

on:
  workflow_call:
    inputs:
      admin_version:
        description: 'Released garage-admin-console semver (e.g. 2.1.4). Empty if not released this run.'
        required: false
        type: string
        default: ''
      s3_version:
        description: 'Released s3-browser semver (e.g. 2.2.0). Empty if not released this run.'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    # Manually trigger from any branch to publish :dev images for end-to-end testing.

jobs:
  check:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # One entry per image, each carrying its own released version. A semver
    # release publishes only the image(s) whose component was released this run;
    # a manual dispatch publishes both as :dev.
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: garage-admin-console
            dockerfile: docker/garage-admin-console.Dockerfile
            version: ${{ inputs.admin_version }}
          # The all-in-one image is part of the Admin Console product, so it
          # tracks the admin version and publishes whenever admin releases.
          - image: garage-admin-all
            dockerfile: docker/garage-admin-all.Dockerfile
            version: ${{ inputs.admin_version }}
          - image: s3-browser
            dockerfile: docker/s3-browser.Dockerfile
            version: ${{ inputs.s3_version }}

    steps:
      - name: Decide whether to publish this image
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ -n "${{ matrix.version }}" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false (component not released this run)"
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: ${{ steps.gate.outputs.build == 'true' }}
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: ${{ steps.gate.outputs.build == 'true' }}
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: ${{ steps.gate.outputs.build == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: ${{ steps.gate.outputs.build == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ steps.gate.outputs.build == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        if: ${{ steps.gate.outputs.build == 'true' }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
            ${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          # A released version publishes semver tags + the implicit :latest.
          # A manual dispatch (no version) publishes :dev and :dev-<sha> only.
          flavor: |
            latest=${{ matrix.version != '' }}
          tags: |
            type=semver,pattern={{version}},value=${{ matrix.version }},enable=${{ matrix.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ matrix.version }},enable=${{ matrix.version != '' }}
            type=semver,pattern={{major}},value=${{ matrix.version }},enable=${{ matrix.version != '' }}
            type=raw,value=dev,enable=${{ matrix.version == '' }}
            type=sha,prefix=dev-,enable=${{ matrix.version == '' }}

      - name: Build and push Docker image
        if: ${{ steps.gate.outputs.build == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
