name: Live tests (contract + E2E)

# The offline `pnpm test` suite gates every PR. The contract suite and Playwright
# E2E need a real Garage/S3 backend, so they run here against an ephemeral Garage
# spun up in the job. Kept off the per-PR critical path (slow + needs Docker):
# runs post-merge on main and on demand.
#
# NOTE: validate-on-first-run. The Garage provisioning below follows the standard
# quick-start, but the exact CLI/admin-token behaviour is version-specific — pin
# GARAGE_IMAGE to the tag matching your cluster and adjust if the first run fails.

on:
  workflow_dispatch:
    inputs:
      garage_image:
        description: 'Garage Docker image (pin to your cluster version)'
        required: false
        type: string
        default: 'dxflrs/garage:v2.2.0'
  push:
    branches: [main]

concurrency:
  group: live-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GARAGE_IMAGE: ${{ inputs.garage_image || 'dxflrs/garage:v2.2.0' }}
  ADMIN_TOKEN: XFyjdfaRCD747MIUdiJ66WeFO6LuKnuGCyw3a3HA1wM=
  RPC_SECRET: 583495332247abf7470407f7f3b413710eda7f0e4a506c3ee97dcc0b4e5fd909
  TEST_S3_BUCKET: s3-browser-test
  TEST_S3_REGION: garage
  BFF_ENCRYPTION_KEY: 5cfd53ba54f3fd6353e967a895ed1e6c
  BFF_JWT_SECRET: 7743867f483f29cb79fa60e1d39b3f25091aa11fb81a299de506aeb2cbb9ca22
  BFF_ADMIN_PASSWORD: ci-admin-password

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --prefer-offline

      - name: Start and provision Garage
        id: garage
        run: scripts/live-tests/start-garage.sh bucket-api

      - name: Build packages + S3 Browser BFF
        run: |
          pnpm build:packages
          pnpm -C s3-browser/api build

      - name: Run the Bucket Backend API contract suite (connections flavor)
        env:
          # BFF under test
          JWT_SECRET: ${{ env.BFF_JWT_SECRET }}
          ENCRYPTION_KEY: ${{ env.BFF_ENCRYPTION_KEY }}
          ADMIN_PASSWORD: ${{ env.BFF_ADMIN_PASSWORD }}
          PORT: '3002'
          DATA_DIR: /tmp/s3-browser-data
          LOG_LEVEL: warn
          # Contract suite config
          TEST_BFF_URL: http://localhost:3002/api
          TEST_BFF_PASSWORD: ${{ env.BFF_ADMIN_PASSWORD }}
          TEST_S3_ENDPOINT: http://localhost:3900
          TEST_S3_ACCESS_KEY: ${{ steps.garage.outputs.access_key }}
          TEST_S3_SECRET_KEY: ${{ steps.garage.outputs.secret_key }}
          TEST_S3_REGION: ${{ env.TEST_S3_REGION }}
          TEST_S3_FORCE_PATH_STYLE: 'true'
          TEST_S3_BUCKET: ${{ env.TEST_S3_BUCKET }}
        run: scripts/live-tests/run-contract-suite.sh

      - name: Garage logs on failure
        if: failure()
        run: scripts/live-tests/garage-logs.sh

      - name: Stop Garage
        if: always()
        run: scripts/live-tests/stop-garage.sh

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm build:packages
      - run: pnpm exec playwright install --with-deps chromium
      - run: mkdir -p /tmp/garage-admin-e2e-data

      - name: Start and provision Garage
        id: garage
        run: scripts/live-tests/start-garage.sh

      - name: Run Playwright E2E against the Admin Console
        env:
          ADMIN_PASSWORD: ${{ env.BFF_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ env.BFF_JWT_SECRET }}
          ENCRYPTION_KEY: ${{ env.BFF_ENCRYPTION_KEY }}
          DATA_DIR: /tmp/garage-admin-e2e-data
          TEST_GARAGE_ENDPOINT: http://localhost:3903
          TEST_GARAGE_ADMIN_TOKEN: ${{ env.ADMIN_TOKEN }}
        run: pnpm e2e

      - name: Garage logs on failure
        if: failure()
        run: scripts/live-tests/garage-logs.sh

      - name: Stop Garage
        if: always()
        run: scripts/live-tests/stop-garage.sh
