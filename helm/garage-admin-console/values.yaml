## Garage Admin Console

replicaCount: 1

image:
  repository: ghcr.io/eyebrowkang/garage-admin-console
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3001

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http
   
pvc:
  name: ""
  storageRequest: ""
  storageClassName: ""

env:
  jwtSecret: "change-me-to-a-random-string"
  encryptionKey: "change-me-exactly-32-characters"
  adminPassword: "change-me-admin-password"

nodeSelector: {}
tolerations: []
affinity: {}
